# Google Cloud Build — production environment
# Triggered on push to main branch
# Builds Docker, runs migrations, deploys to Cloud Run (prod service)
# Env vars come from Secret Manager (PROD- prefixed names)

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest'
      - '.'
    dir: '.'

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA}'

  # 3. Deploy to Cloud Run (prod)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        cat > /tmp/env.yaml << 'EOF'
        CORS_ORIGINS: '["https://bandami.com","https://www.bandami.com"]'
        ENVIRONMENT: production
        DEBUG: "false"
        FRONTEND_URL: ${_FRONTEND_URL}
        BACKEND_URL: ${_BACKEND_URL}
        PAYMENT_PROVIDER: polar
        POLAR_ENVIRONMENT: production
        POLAR_PRODUCT_PREMIUM: "844689b8-66ba-4b8a-9660-513e1acbce11"
        BREVO_FROM_EMAIL: '${_BREVO_FROM_EMAIL}'
        EOF

        gcloud run deploy ${_SERVICE} \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --cpu 1 \
          --memory 512Mi \
          --timeout 300 \
          --min-instances 1 \
          --set-secrets DATABASE_URL=PROD_DATABASE_URL:latest,OPENAI_API_KEY=PROD_OPENAI_API_KEY:latest,GEMINI_API_KEY=PROD_GEMINI_API_KEY:latest,JWT_SECRET_KEY=PROD_JWT_SECRET_KEY:latest,BREVO_API_KEY=PROD_BREVO_API_KEY:latest,POLAR_ACCESS_TOKEN=PROD_POLAR_ACCESS_TOKEN:latest,POLAR_WEBHOOK_SECRET=PROD_POLAR_WEBHOOK_SECRET:latest,GOOGLE_CLIENT_ID=PROD_GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=PROD_GOOGLE_CLIENT_SECRET:latest \
          --env-vars-file /tmp/env.yaml

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA}'

substitutions:
  _REGION: us-central1
  _SERVICE: ielts-backend
  _REPOSITORY: prod-backend
  _FRONTEND_URL: https://bandami.com
  _BACKEND_URL: https://api.bandami.com
  _BREVO_FROM_EMAIL: Bandami <contacto@bandami.com>
  _COMMIT_SHA: latest

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

timeout: 900s
