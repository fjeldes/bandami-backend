name: Backend CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ielts
          POSTGRES_PASSWORD: ielts
          POSTGRES_DB: ielts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx

      - name: Unit tests
        run: python -m pytest tests/unit/ -v --tb=short
        env:
          DATABASE_URL: postgresql://ielts:ielts@localhost:5432/ielts_test
          JWT_SECRET_KEY: test-secret-key-for-testing-only-64-chars-long

      - name: API tests
        run: python -m pytest tests/api/ -v --tb=short -k "not db"
        env:
          DATABASE_URL: postgresql://ielts:ielts@localhost:5432/ielts_test
          JWT_SECRET_KEY: test-secret-key-for-testing-only-64-chars-long
          OPENAI_API_KEY: sk-test
          GEMINI_API_KEY: test
