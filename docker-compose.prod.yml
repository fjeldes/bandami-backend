# Production docker-compose (use: docker compose -f docker-compose.prod.yml up -d)
services:
  db:
    image: postgres:16-alpine
    container_name: ielts-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No port exposure in production — internal network only
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ielts-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    # No bind mount in production — code is baked into image
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
