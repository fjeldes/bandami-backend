# Google Cloud Build — dev environment
# Triggered on push to develop branch
# Builds Docker, runs migrations, deploys to Cloud Run (dev service)
# Env vars come from Secret Manager (dev- prefixed names)

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest'
      - '.'
    dir: '.'

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA'

  # 3. Deploy to Cloud Run (dev)
  # Migrations run automatically on startup via start.sh → migrate.py
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--cpu-boost'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--timeout'
      - '300'
      - '--set-secrets'
      - 'DATABASE_URL=DEV_DATABASE_URL:latest,OPENAI_API_KEY=DEV_OPENAI_API_KEY:latest,GEMINI_API_KEY=DEV_GEMINI_API_KEY:latest,JWT_SECRET_KEY=DEV_JWT_SECRET_KEY:latest,BREVO_API_KEY=DEV_BREVO_API_KEY:latest,STRIPE_SECRET_KEY=DEV_STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=DEV_STRIPE_WEBHOOK_SECRET:latest,GOOGLE_CLIENT_ID=DEV_GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=DEV_GOOGLE_CLIENT_SECRET:latest'
      - '--set-env-vars'
      - 'ENVIRONMENT=development,DEBUG=true,FRONTEND_URL=${_FRONTEND_URL},CORS_ORIGINS=["${_FRONTEND_URL}"],PAYMENT_PROVIDER=stripe,BREVO_FROM_EMAIL=${_BREVO_FROM_EMAIL},STRIPE_PRICE_PREMIUM=${_STRIPE_PRICE_PREMIUM},STRIPE_PRICE_EXAM_WEEK=${_STRIPE_PRICE_EXAM_WEEK},STRIPE_PRICE_CREDIT_10=${_STRIPE_PRICE_CREDIT_10},STRIPE_PRICE_CREDIT_25=${_STRIPE_PRICE_CREDIT_25}'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$COMMIT_SHA'

substitutions:
  _REGION: us-central1
  _SERVICE: dev-ielts-backend
  _REPOSITORY: dev-backend
  _FRONTEND_URL: https://dev.bandami.com
  _BREVO_FROM_EMAIL: Bandami Dev <contacto@bandami.com>
  _STRIPE_PRICE_PREMIUM: price_xxx
  _STRIPE_PRICE_EXAM_WEEK: price_xxx
  _STRIPE_PRICE_CREDIT_10: price_xxx
  _STRIPE_PRICE_CREDIT_25: price_xxx

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DEV_DATABASE_URL/versions/latest
      env: DATABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/DEV_OPENAI_API_KEY/versions/latest
      env: OPENAI_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/DEV_GEMINI_API_KEY/versions/latest
      env: GEMINI_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/DEV_JWT_SECRET_KEY/versions/latest
      env: JWT_SECRET_KEY
    - versionName: projects/$PROJECT_ID/secrets/DEV_BREVO_API_KEY/versions/latest
      env: BREVO_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/DEV_STRIPE_SECRET_KEY/versions/latest
      env: STRIPE_SECRET_KEY
    - versionName: projects/$PROJECT_ID/secrets/DEV_STRIPE_WEBHOOK_SECRET/versions/latest
      env: STRIPE_WEBHOOK_SECRET
    - versionName: projects/$PROJECT_ID/secrets/DEV_GOOGLE_CLIENT_ID/versions/latest
      env: GOOGLE_CLIENT_ID
    - versionName: projects/$PROJECT_ID/secrets/DEV_GOOGLE_CLIENT_SECRET/versions/latest
      env: GOOGLE_CLIENT_SECRET

timeout: 900s
