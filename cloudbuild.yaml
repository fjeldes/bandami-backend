# Google Cloud Build — dev environment
# Triggered on push to develop branch
# Builds Docker, runs migrations, deploys to Cloud Run (dev service)
# Env vars come from Secret Manager (dev- prefixed names)

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest'
      - '.'
    dir: '.'

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA}'

  # 3. Deploy to Cloud Run (dev)
  # Migrations run automatically on startup via start.sh → migrate.py
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        cat > /tmp/env.yaml << 'EOF'
        CORS_ORIGINS: '["https://dev.bandami.com"]'
        ENVIRONMENT: development
        DEBUG: "true"
        FRONTEND_URL: ${_FRONTEND_URL}
        BACKEND_URL: ${_BACKEND_URL}
        PAYMENT_PROVIDER: polar
        POLAR_ENVIRONMENT: sandbox
        POLAR_PRODUCT_PREMIUM: "35bfb21d-7c1f-4086-b647-4511cdaf57a5"
        FLOW_ENVIRONMENT: sandbox
        BREVO_FROM_EMAIL: '${_BREVO_FROM_EMAIL}'
        EOF

        gcloud run deploy ${_SERVICE} \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --cpu-boost \
          --port 8080 \
          --memory 512Mi \
          --timeout 300 \
          --set-secrets DATABASE_URL=DEV_DATABASE_URL:latest,OPENAI_API_KEY=DEV_OPENAI_API_KEY:latest,GEMINI_API_KEY=DEV_GEMINI_API_KEY:latest,JWT_SECRET_KEY=DEV_JWT_SECRET_KEY:latest,BREVO_API_KEY=DEV_BREVO_API_KEY:latest,POLAR_ACCESS_TOKEN=DEV_POLAR_ACCESS_TOKEN:latest,POLAR_WEBHOOK_SECRET=DEV_POLAR_WEBHOOK_SECRET:latest,GOOGLE_CLIENT_ID=DEV_GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=DEV_GOOGLE_CLIENT_SECRET:latest \
          --env-vars-file /tmp/env.yaml

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_COMMIT_SHA}'

substitutions:
  _REGION: us-central1
  _SERVICE: dev-ielts-backend
  _REPOSITORY: dev-backend
  _FRONTEND_URL: https://dev.bandami.com
  _BACKEND_URL: https://dev-api.bandami.com
  _BREVO_FROM_EMAIL: Bandami Dev <contacto@bandami.com>
  _COMMIT_SHA: latest

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

timeout: 900s
